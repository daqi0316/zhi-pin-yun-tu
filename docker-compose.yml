services:
  mysql:
    image: docker.m.daocloud.io/library/mysql:8.0
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-zhypx2026}
      MYSQL_DATABASE: zhypx
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  app:
    build: .
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD:-zhypx2026}@mysql:3306/zhypx
      PORT: "3001"
      APP_ID: zhypx-dev
      APP_SECRET: ${APP_SECRET:-please-change-this-secret-in-production}
      APP_URL: http://localhost:3001
      KIMI_AUTH_URL: http://auth.local
      KIMI_OPEN_URL: http://open.local
      OWNER_UNION_ID: admin
      NODE_ENV: production
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_data:
  uploads_data:
